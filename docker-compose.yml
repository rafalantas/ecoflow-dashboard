version: '3.8'
services:
  ecoflow-dashboard:
    build: .
    image: ecoflow-dashboard:latest
    container_name: ecoflow-dashboard
    ports:
      - "8080:8080"
    environment:
      - DEVICE_SN=${DEVICE_SN}
      - EF_ACCESS_KEY=${EF_ACCESS_KEY}
      - EF_SECRET_KEY=${EF_SECRET_KEY}
    restart: unless-stopped
 
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - ecoflow-dashboard
